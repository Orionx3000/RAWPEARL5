<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAWPEARL5 - ASCII Matrix DAW</title>
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      var errorMsg = msg + '\n' + url + ':' + lineNo + ':' + columnNo;
      var stack = error && error.stack ? '\n' + error.stack : '';
      var div = document.createElement('div');
      div.style.cssText = 'color:red; background:white; position:absolute; z-index:99999; top:0; left:0; width:100%; height:100%; padding:20px; font-size:16px; overflow:auto;';
      div.innerText = 'WebView Crash:\n' + errorMsg + stack;
      if(document.body) document.body.appendChild(div);
      else window.onload = () => document.body.appendChild(div);
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      var div = document.createElement('div');
      div.style.cssText = 'color:red; background:white; position:absolute; z-index:99999; top:0; left:0; width:100%; height:100%; padding:20px; font-size:16px; overflow:auto;';
      div.innerText = 'Unhandled Promise Rejection:\n' + (event.reason ? event.reason.stack || event.reason : 'Unknown reason');
      if(document.body) document.body.appendChild(div);
      else window.onload = () => document.body.appendChild(div);
    });
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
